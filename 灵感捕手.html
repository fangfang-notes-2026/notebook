<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🧠 灵感捕手 · 我的网页记事本</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0d1117;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        .notebook {
            background: #161b22;
            width: 100%;
            max-width: 820px;
            border-radius: 28px;
            padding: 30px 30px 20px 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            border: 1px solid #30363d;
            transition: all 0.2s;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 18px;
        }

        .title {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #f0f6fc;
            font-size: 20px;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .title span {
            background: #238636;
            font-size: 14px;
            padding: 2px 12px;
            border-radius: 40px;
            color: white;
            font-weight: 400;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .toolbar button {
            background: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 450;
        }

        .toolbar button:hover {
            background: #30363d;
            border-color: #58a6ff;
            color: #f0f6fc;
        }

        .toolbar .danger:hover {
            border-color: #f85149;
            color: #f85149;
            background: #2d1b1e;
        }

        .toolbar .save-btn {
            background: #238636;
            border-color: #2ea043;
            color: white;
        }

        .toolbar .save-btn:hover {
            background: #2ea043;
            border-color: #3fb950;
        }

        textarea {
            width: 100%;
            height: 58vh;
            min-height: 300px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 16px;
            padding: 20px 22px;
            color: #e6edf3;
            font-size: 16px;
            line-height: 1.75;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            resize: vertical;
            outline: none;
            transition: border 0.2s;
            letter-spacing: 0.2px;
        }

        textarea:focus {
            border-color: #58a6ff;
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
        }

        textarea::placeholder {
            color: #484f58;
            font-size: 15px;
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 16px;
            color: #484f58;
            font-size: 13px;
            gap: 8px;
        }

        .stats {
            display: flex;
            gap: 18px;
        }

        .stats span {
            background: #0d1117;
            padding: 2px 14px;
            border-radius: 40px;
            border: 1px solid #21262d;
            color: #8b949e;
        }

        .status {
            color: #238636;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status.offline {
            color: #484f58;
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #238636;
            display: inline-block;
        }

        .dot.off {
            background: #484f58;
        }

        @media (max-width: 550px) {
            .notebook { padding: 18px 16px 16px 16px; }
            .header { flex-direction: column; align-items: stretch; }
            .title { font-size: 18px; }
            .toolbar { justify-content: flex-start; }
            textarea { font-size: 15px; padding: 16px; min-height: 220px; }
        }
    </style>
</head>
<body>

<div class="notebook">
    <div class="header">
        <div class="title">
            🧠 灵感捕手
            <span>本地</span>
        </div>
        <div class="toolbar">
            <button class="save-btn" id="downloadBtn">📥 下载 .txt</button>
            <button id="saveStatusBtn">💾 手动保存</button>
            <button class="danger" id="clearBtn">🗑️ 清空</button>
        </div>
    </div>

    <textarea id="noteArea" placeholder="✍️ 把灵感贴进来…… 自动保存，关掉网页也还在。"></textarea>

    <div class="footer">
        <div class="stats">
            <span id="charCount">0 字符</span>
            <span id="lineCount">0 行</span>
        </div>
        <div class="status" id="saveStatus">
            <span class="dot" id="statusDot"></span>
            <span id="statusText">已自动保存</span>
        </div>
    </div>
</div>

<script>
    (function() {
        const textarea = document.getElementById('noteArea');
        const charCount = document.getElementById('charCount');
        const lineCount = document.getElementById('lineCount');
        const statusText = document.getElementById('statusText');
        const statusDot = document.getElementById('statusDot');
        const saveStatusDiv = document.getElementById('saveStatus');

        // 存储键名
        const STORAGE_KEY = 'inspiration_notebook_content';

        // ---------- 加载保存的内容 ----------
        function loadContent() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved !== null && saved !== undefined) {
                    textarea.value = saved;
                } else {
                    textarea.value = ''; // 空内容
                }
            } catch (e) {
                textarea.value = '';
            }
            updateStatsAndStatus(true);
        }

        // ---------- 保存内容 ----------
        function saveContent(showFeedback = true) {
            try {
                const content = textarea.value;
                localStorage.setItem(STORAGE_KEY, content);
                if (showFeedback) {
                    setStatus('已保存', true);
                }
                updateStatsAndStatus(false);
                return true;
            } catch (e) {
                if (showFeedback) {
                    setStatus('保存失败，存储空间可能已满', false);
                }
                return false;
            }
        }

        // ---------- 更新统计与状态 ----------
        function updateStatsAndStatus(silent = false) {
            const text = textarea.value;
            const charLen = text.length;
            const lines = text === '' ? 0 : text.split('\n').length;
            charCount.textContent = charLen + ' 字符';
            lineCount.textContent = lines + ' 行';

            // 如果处于静默加载，不覆盖状态文字
            if (!silent) {
                // 保持当前状态文字不变（防止频繁闪烁）
            }
        }

        // ---------- 设置状态栏 ----------
        function setStatus(msg, isSuccess) {
            statusText.textContent = msg;
            if (isSuccess) {
                statusDot.className = 'dot';
                saveStatusDiv.className = 'status';
            } else {
                statusDot.className = 'dot off';
                saveStatusDiv.className = 'status offline';
            }
            // 3秒后恢复为 "已保存" 状态（如果是成功）
            if (isSuccess) {
                clearTimeout(window.statusTimer);
                window.statusTimer = setTimeout(() => {
                    statusText.textContent = '已自动保存';
                    statusDot.className = 'dot';
                    saveStatusDiv.className = 'status';
                }, 2500);
            }
        }

        // ---------- 清空（带确认） ----------
        function clearContent() {
            if (textarea.value.trim() === '') {
                // 已经是空的，就不弹窗了
                return;
            }
            if (confirm('⚠️ 确定要清空所有内容吗？\n（清空后不可恢复，除非你有备份）')) {
                textarea.value = '';
                saveContent(true);
                setStatus('已清空', true);
                textarea.focus();
            }
        }

        // ---------- 下载为 .txt ----------
        function downloadTxt() {
            const content = textarea.value;
            if (content.trim() === '') {
                alert('📭 记事本是空的，没什么可下载的。');
                return;
            }
            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            const now = new Date();
            const dateStr = 
                now.getFullYear() + '-' + 
                String(now.getMonth() + 1).padStart(2, '0') + '-' + 
                String(now.getDate()).padStart(2, '0') + '_' + 
                String(now.getHours()).padStart(2, '0') + '-' + 
                String(now.getMinutes()).padStart(2, '0');
            a.download = `灵感笔记_${dateStr}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            setStatus('📥 下载成功', true);
        }

        // ---------- 事件绑定 ----------
        // 1. 输入时自动保存（防抖，避免频繁写）
        let saveTimer = null;
        textarea.addEventListener('input', function() {
            // 更新字符统计
            const text = textarea.value;
            const charLen = text.length;
            const lines = text === '' ? 0 : text.split('\n').length;
            charCount.textContent = charLen + ' 字符';
            lineCount.textContent = lines + ' 行';

            // 防抖保存
            clearTimeout(saveTimer);
            saveTimer = setTimeout(() => {
                saveContent(true);
            }, 400);
        });

        // 2. 手动保存按钮
        document.getElementById('saveStatusBtn').addEventListener('click', function() {
            saveContent(true);
        });

        // 3. 下载按钮
        document.getElementById('downloadBtn').addEventListener('click', downloadTxt);

        // 4. 清空按钮
        document.getElementById('clearBtn').addEventListener('click', clearContent);

        // 5. 快捷键：Ctrl+S 保存，Ctrl+Shift+Delete 清空（防止误触）
        document.addEventListener('keydown', function(e) {
            // Ctrl+S (或 Command+S)
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                saveContent(true);
                setStatus('✅ 已保存', true);
            }
            // Ctrl+Shift+Delete 清空（组合键，防止误触）
            if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'Delete') {
                e.preventDefault();
                clearContent();
            }
        });

        // 6. 页面关闭前主动保存（防止丢失最后几个字）
        window.addEventListener('beforeunload', function() {
            // 直接保存，不显示反馈
            try {
                localStorage.setItem(STORAGE_KEY, textarea.value);
            } catch (e) {}
        });

        // ---------- 初始化 ----------
        loadContent();

        // 额外：点击页面空白处聚焦到文本框
        document.querySelector('.notebook').addEventListener('click', function(e) {
            if (e.target === this || e.target.closest('.notebook') === this) {
                // 但如果点击的是按钮或工具栏，不抢焦点
                if (!e.target.closest('.toolbar') && !e.target.closest('.footer') && !e.target.closest('.header')) {
                    textarea.focus();
                }
            }
        });

        // 启动后自动聚焦
        setTimeout(() => textarea.focus(), 200);
    })();
</script>
</body>
</html>
